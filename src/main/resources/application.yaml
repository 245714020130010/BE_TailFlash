server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: tailflash-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/tailflash_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USERNAME:tailflash_user}
    password: ${DB_PASSWORD:password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  jackson:
    default-property-inclusion: non_null
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    org.springframework.security: INFO

app:
  jwt:
    issuer: tailflash
    secret: ${JWT_SECRET}
    access-token-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:900}
    refresh-token-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:604800}
  mail:
    password-reset:
      from-email: ${MAIL_FROM_EMAIL:no-reply@tailflash.local}
      from-name: ${MAIL_FROM_NAME:TailFlash Support}
      reset-url: ${PASSWORD_RESET_URL:http://localhost:3000/reset-password}
      token-ttl-minutes: ${PASSWORD_RESET_TOKEN_TTL_MINUTES:15}
