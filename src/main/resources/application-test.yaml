spring:
  datasource:
    url: ${TEST_DB_URL:jdbc:mysql://localhost:3306/tailflash_test_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${TEST_DB_USERNAME:tailflash_user}
    password: ${TEST_DB_PASSWORD:password}
  flyway:
    enabled: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
